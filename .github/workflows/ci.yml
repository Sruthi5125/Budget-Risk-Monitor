name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:15
        env:
          POSTGRES_DB: finance_db
          POSTGRES_USER: finance_user
          POSTGRES_PASSWORD: finance_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run migrations
        env:
          SECRET_KEY: ci-test-secret-key
          DEBUG: 'True'
          DB_NAME: finance_db
          DB_USER: finance_user
          DB_PASSWORD: finance_password
          DB_HOST: localhost
          DB_PORT: '5432'
        run: python manage.py migrate --noinput

      - name: Run tests
        env:
          SECRET_KEY: ci-test-secret-key
          DEBUG: 'True'
          DB_NAME: finance_db
          DB_USER: finance_user
          DB_PASSWORD: finance_password
          DB_HOST: localhost
          DB_PORT: '5432'
        run: python manage.py test --verbosity=2

  build-backend-image:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build backend Docker image
        run: docker build -t budget-backend:latest .

  build-frontend-image:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build frontend Docker image
        run: docker build -t budget-frontend:latest ./frontend

  push-to-dockerhub:
    runs-on: ubuntu-latest
    needs: [test-backend, build-backend-image, build-frontend-image]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/budget-backend:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/budget-frontend:latest
